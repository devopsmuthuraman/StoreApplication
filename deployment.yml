apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform_jenkinserve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: terraform_jenkinserve
  template:
    metadata:
      labels:
        app: terraform_jenkinserve
    spec:
      containers:
      - name: terraform_jenkinserve
        image: mubha/terraform_jenkinserve:latest
        ports:
        - containerPort: 80